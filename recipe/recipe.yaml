schema_version: 1

context:
  version: "1.14.0"

package:
  name: revive
  version: ${{ version }}

source:
  url: https://github.com/mgechev/revive/archive/v${{ version }}.tar.gz
  sha256: 0c38a7e80fa00fc93bf57f87b80ada7576037af2d392d993ef4b0d089baaa34e

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - revive --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Fast, configurable, extensible, flexible, and beautiful linter for Go
  homepage: https://github.com/mgechev/revive
  repository: https://github.com/mgechev/revive

extra:
  recipe-maintainers:
    - danielnachun
